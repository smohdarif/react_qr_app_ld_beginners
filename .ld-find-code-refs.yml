projects:
  - key: arif-test-project   # ← replace
    dir: .
    aliases:
      # 1) Map kebab-case (LD) ↔ camelCase (React):
      - type: camelcase

      # 2) Tell the scanner how to "see" tokens like flags.releaseHeart:
      - type: regex
        pattern: 'flags\\.([A-Za-z0-9_]+)'
        subst: '$1'
